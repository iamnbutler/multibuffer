name: Benchmarks

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bench:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run benchmarks (5 runs, take best)
        run: |
          for i in 1 2 3 4 5; do
            echo "Run $i/5..."
            bun run bench --json > "bench-run-$i.json"
          done

          # Merge runs: for each benchmark, take the minimum avgMs (best of 5)
          jq -s '
            # Flatten all suites from all runs
            [.[]] |
            # Group by suite name
            group_by(.[0].suite) |
            map(
              # For each suite group, get suite name and merge results
              {
                suite: .[0][0].suite,
                results: (
                  # Flatten all results from this suite across runs
                  [.[][] | .results[]] |
                  # Group by benchmark name
                  group_by(.name) |
                  # For each benchmark, take the run with minimum avgMs
                  map(min_by(.avgMs))
                )
              }
            )
          ' bench-run-*.json > bench-results.json

      - name: Push results to bench-data branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Try to fetch existing bench-data branch, or create orphan
          if git fetch origin bench-data 2>/dev/null; then
            git checkout bench-data
          else
            git checkout --orphan bench-data
            git rm -rf .
            echo "# Benchmark History" > README.md
            echo "" >> README.md
            echo "This branch stores benchmark results (best of 5 runs per commit)." >> README.md
            echo "" >> README.md
            echo "Each line in history.jsonl is a JSON object with:" >> README.md
            echo "- \`sha\`: commit hash" >> README.md
            echo "- \`timestamp\`: ISO timestamp" >> README.md
            echo "- \`suites\`: array of benchmark suite results (best avgMs from 5 runs)" >> README.md
            git add README.md
          fi

          # Build the history entry
          ENTRY=$(jq -c --arg sha "${{ github.sha }}" --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{sha: $sha, timestamp: $ts, suites: .}' bench-results.json)

          # Remove any existing entry for this SHA, then append new entry
          if [ -f history.jsonl ]; then
            grep -v "\"sha\":\"${{ github.sha }}\"" history.jsonl > history.jsonl.tmp || true
            mv history.jsonl.tmp history.jsonl
          fi
          echo "$ENTRY" >> history.jsonl

          git add history.jsonl
          git commit -m "bench: ${{ github.sha }}"
          git push origin bench-data
